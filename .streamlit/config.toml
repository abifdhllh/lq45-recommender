# Tema default = gelap (selaras toggle "Mode gelap" default ON).
# Streamlit menerapkan tema ke dataframe, select, tombol — tanpa CSS manual yang bentrok.

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#3fb984"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#161b22"
textColor = "#fafafa"
font = "sans serif"
